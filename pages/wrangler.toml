name = "my-vault"
compatibility_date = "2024-12-01"
pages_build_output_dir = "./public"

# Bind the R2 bucket that stores source vault files (markdown, images, audio, etc.)
[[r2_buckets]]
binding = "VAULT"
bucket_name = "my-vault-source"

# API_KEY is set as a secret via:
#   wrangler pages secret put API_KEY --project-name=my-vault
[vars]
MAX_FILE_BYTES = "26214400"  # 25 MB default
